<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>«Евгений Онегин» | Викторина | 9 класс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Times New Roman', serif;
            background: linear-gradient(145deg, #1e2e2c 0%, #0f1f1d 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-wrapper {
            max-width: 950px;
            width: 100%;
            margin: 0 auto;
        }

        .quiz-card {
            background: #fefaf2;
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        .quiz-header {
            background: linear-gradient(135deg, #2c5a4a, #1c3f33);
            padding: 1.2rem 2rem;
            color: #fef0cf;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 4px solid #e2b87a;
        }

        .title h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .title p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 0.2rem;
            font-style: italic;
        }

        .score-box {
            background: #e2b87a;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            color: #2a3a2e;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .quiz-body {
            padding: 2rem 2rem 1.8rem;
            min-height: 450px;
        }

        .question-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3a2f;
            line-height: 1.4;
            margin-bottom: 1.8rem;
            background: #f2efe0;
            padding: 1rem 1.3rem;
            border-radius: 1.5rem;
            border-left: 8px solid #e2b87a;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .option {
            background: white;
            border-radius: 1.2rem;
            border: 2px solid #e0d6ca;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            gap: 1rem;
        }

        .option.selectable:hover {
            background: #fcf3e8;
            border-color: #e2b87a;
            transform: scale(0.99);
        }

        .option-letter {
            font-weight: 800;
            background: #ede3d7;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            font-size: 1.2rem;
            color: #2c5a4a;
        }

        .option-text {
            font-size: 1rem;
            font-weight: 500;
            color: #2e3a2e;
            flex: 1;
        }

        .paper-mode .option {
            cursor: default;
            background: #fefcf8;
        }
        .paper-mode .option:hover {
            background: #fefcf8;
            border-color: #e0d6ca;
            transform: none;
        }

        .option.correct-highlight {
            background: #d4ecd7;
            border-color: #2e6b3e;
        }
        .option.wrong-highlight {
            background: #ffe0db;
            border-color: #bc3f2a;
        }
        .option.selected-highlight {
            background: #f1e5d6;
            border-color: #e2b87a;
        }
        .disabled-option {
            pointer-events: none;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        button {
            background: #2c5a4a;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.7rem 1.8rem;
            border-radius: 2.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            background: #9bb5a8;
            cursor: not-allowed;
        }
        .btn-next {
            background: #c9824b;
        }
        .btn-restart {
            background: #5c6e5a;
            margin-top: 1rem;
        }
        .progress-info {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #7a5a3e;
            text-align: center;
            background: #f6efdf;
            padding: 0.4rem;
            border-radius: 30px;
        }

        .mode-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            gap: 2rem;
        }
        .mode-buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            background: #2c5a4a;
            padding: 1rem 2rem;
            font-size: 1.3rem;
            min-width: 200px;
        }
        .mode-btn.paper {
            background: #4a6741;
        }
        .mode-title {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: #2c4a3e;
        }
        .mode-desc {
            color: #6b5a44;
            font-size: 0.95rem;
        }

        .final-list {
            background: #faf6ea;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-top: 1rem;
            max-height: 450px;
            overflow-y: auto;
        }
        .final-item {
            padding: 0.6rem;
            border-bottom: 1px solid #e0d0bc;
        }
        .feedback-message {
            padding: 1rem;
            border-radius: 1.2rem;
            text-align: center;
            font-weight: 600;
            margin-top: 1rem;
        }
        .joke-badge {
            background: #e2b87a;
            color: #2a3a2e;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-left: 0.8rem;
            vertical-align: middle;
            font-weight: 600;
        }

        @media (max-width: 620px) {
            .question-text { font-size: 1.2rem; }
            .quiz-body { padding: 1.2rem; }
            .option { padding: 0.7rem 1rem; }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper" id="quizWrapper">
    <div class="quiz-card" id="quizCard">
        <div class="quiz-header">
            <div class="title">
                <h1>📖 «Евгений Онегин»</h1>
                <p>А.С. Пушкин · Викторина · 9 класс</p>
            </div>
            <div class="score-box" id="scoreBox">
                <span>🏆 Баллы:</span> <span id="scoreDisplay">0</span> / <span id="totalSpan">20</span>
            </div>
        </div>
        <div class="quiz-body" id="quizBody">
            <!-- динамическое содержимое -->
        </div>
    </div>
</div>

<script>
    // ======================= 20 ВОПРОСОВ по "Евгению Онегину" =======================
    const QUESTIONS = [
        // Обычные вопросы с вариантами
        { text: "Как звали дядю Онегина, который «честно правил» и умер, оставив наследство?", options: ["Иван Петрович", "Дмитрий Львович", "Алексей Михайлович", "В романе имя не указано"], correct: 3, type: "choice", explanation: "В романе дядя Онегина остаётся безымянным — Пушкин не даёт ему имени." },
        { text: "Как звали няню Татьяны Лариной?", options: ["Арина Родионовна", "Филипьевна", "Анисья", "Марья"], correct: 1, type: "choice", explanation: "Няню Татьяны зовут Филипьевна (в тексте: «Филипьевна, седая старушка»)." },
        { text: "Кто убил Владимира Ленского на дуэли?", options: ["Зарецкий", "Евгений Онегин", "Гильо (слуга)", "Сам Ленский"], correct: 1, type: "choice", explanation: "Онегин выстрелил первым и убил Ленского." },
        { text: "Сколько лет было Татьяне Лариной в начале романа?", options: ["13 лет", "16 лет", "17 лет", "18 лет"], correct: 0, type: "choice", explanation: "В романе сказано: «Уж ей тринадцать лет прошло»." },
        { text: "Кто такой Зарецкий в романе?", options: ["Друг Онегина", "Секундант и бывший бретёр", "Слуга Лариных", "Помещик-сосед"], correct: 1, type: "choice", explanation: "Зарецкий — секундант Онегина и Ленского, известный бретёр и сплетник." },
        { text: "Как звали мужа Татьяны в конце романа?", options: ["Князь N", "Генерал N", "Князь Гремин", "Имя не названо"], correct: 2, type: "choice", explanation: "В романе он назван князем Греминым." },
        { text: "Какое прозвище было у отца Онегина?", options: ["«Мот»", "«Француз»", "«Счастливчик»", "«Философ»"], correct: 0, type: "choice", explanation: "Отец Онегина «служил отлично благородно, / Долгами жил, давал три бала / И наконец промотался». Пушкин называет его «мот»." },
        { text: "Где происходит дуэль Онегина и Ленского?", options: ["У реки", "В роще", "У мельницы", "В лесу"], correct: 2, type: "choice", explanation: "Дуэль состоялась у мельницы рано утром." },
        { text: "Кто привёз письмо Татьяны к Онегину?", options: ["Няня", "Слуга", "Двоюродная сестра", "Почтальон"], correct: 0, type: "choice", explanation: "Татьяна отдала письмо няне, а та передала его с внуком." },
        { text: "Какую книгу читала Татьяна, сидя в кабинете Онегина?", options: ["«Вертер» Гёте", "«Дон Жуан» Байрона", "«Исповедь» Руссо", "«Кавказский пленник»"], correct: 1, type: "choice", explanation: "Татьяна читала книги Байрона, в том числе «Дон Жуана»." },

        // Правда / Ложь
        { text: "Онегин был дружен с Ленским и завидовал его поэтическому таланту.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Онегин не завидовал Ленскому, он относился к его стихам снисходительно, считал его наивным, но ценил его искренность." },
        { text: "Татьяна вышла замуж за генерала, старого знакомого её семьи.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Она вышла замуж за генерала, но он не был старым знакомым — он был её мужем, которого она встретила в Москве." },
        { text: "Ольга Ларина после смерти Ленского вышла замуж за улана.", options: ["Правда", "Ложь"], correct: 0, type: "truefalse", explanation: "Верно: Ольга недолго горевала и уехала с уланом." },
        { text: "Пушкин закончил «Евгения Онегина» 8-й главой, в которой Онегин погибает.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Роман заканчивается 8-й главой, но Онегин не погибает — он остаётся у ног Татьяны, а автор прощается с ним." },
        { text: "Ленский был влюблён в Татьяну, но она отвергла его.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Ленский был влюблён в Ольгу, сестру Татьяны." },
        { text: "Онегин стрелял на дуэли первым, потому что Ленский опоздал.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Онегин выстрелил первым, потому что разозлился, но Ленский не опаздывал — они приехали почти одновременно." },
        { text: "Имя «Татьяна» было редким в дворянской среде и Пушкин выбрал его намеренно.", options: ["Правда", "Ложь"], correct: 0, type: "truefalse", explanation: "Верно, Пушкин пишет: «Впервые именем таким страницы нежные романа мы своевольно освятим»." },
        { text: "Онегин отверг любовь Татьяны, потому что боялся осуждения света.", options: ["Правда", "Ложь"], correct: 1, type: "truefalse", explanation: "Онегин отверг Татьяну, потому что не был готов к браку и не испытывал к ней любви, а не из-за страха перед светом." },
        { text: "В финале романа Татьяна признаётся Онегину, что всё ещё его любит, но остаётся верна мужу.", options: ["Правда", "Ложь"], correct: 0, type: "truefalse", explanation: "Верно: «Я вас люблю (к чему лукавить?), но я другому отдана; я буду век ему верна»." },
        // Шуточный вопрос про Алексея Рылова (убил Ленского на дуэли)
        { text: "Алексей Рылов убил Ленского на дуэли.", options: ["Правда", "Ложь"], correct: 0, type: "truefalse", explanation: "Конечно, это шутка! В романе Ленского убил Онегин. Но мы отвечаем «Правда» ради смеха 😄", isJoke: true }
    ];

    const TOTAL = QUESTIONS.length;
    document.getElementById("totalSpan").innerText = TOTAL;

    let mode = null;
    let currentIndex = 0;
    let userAnswers = new Array(TOTAL).fill(null);
    let answerStatus = new Array(TOTAL).fill(false);
    let answered = new Array(TOTAL).fill(false);
    let quizCompleted = false;
    let paperFinished = false;

    const quizBodyDiv = document.getElementById("quizBody");
    const scoreSpan = document.getElementById("scoreDisplay");

    function updateScoreUI() {
        if (mode !== 'screen') return;
        let correctCount = answerStatus.filter(v => v === true).length;
        scoreSpan.innerText = correctCount;
    }

    function evaluateQuestion(idx) {
        const selected = userAnswers[idx];
        if (selected === null) {
            answerStatus[idx] = false;
            return false;
        }
        const isCorrect = (selected === QUESTIONS[idx].correct);
        answerStatus[idx] = isCorrect;
        return isCorrect;
    }

    // ============================ РЕЖИМ "НА ЭКРАНЕ" ============================
    function onSelectOption_Screen(optIndex) {
        if (quizCompleted) return;
        if (userAnswers[currentIndex] === optIndex) return;
        userAnswers[currentIndex] = optIndex;
        evaluateQuestion(currentIndex);
        updateScoreUI();
        renderScreenQuestion();
    }

    function renderScreenQuestion() {
        const q = QUESTIONS[currentIndex];
        const selectedIdx = userAnswers[currentIndex];
        const isFinished = quizCompleted;
        const isJoke = q.isJoke || false;

        let optionsHtml = '';
        const letters = q.type === 'choice' ? ['А', 'Б', 'В', 'Г'] : ['А', 'Б'];

        q.options.forEach((opt, idx) => {
            let additionalClasses = '';
            if (isFinished) {
                const isCorrectAnswer = (idx === q.correct);
                if (isCorrectAnswer) additionalClasses = 'correct-highlight';
                if (selectedIdx === idx && selectedIdx !== null && selectedIdx !== q.correct) {
                    additionalClasses = 'wrong-highlight';
                }
                if (isCorrectAnswer && selectedIdx === null) additionalClasses = 'correct-highlight';
                additionalClasses += ' disabled-option';
            } else {
                if (selectedIdx === idx) additionalClasses = 'selected-highlight';
            }
            optionsHtml += `
                <div class="option ${additionalClasses} selectable" data-opt-index="${idx}">
                    <div class="option-letter">${letters[idx]}</div>
                    <div class="option-text">${escapeHtml(opt)}</div>
                </div>
            `;
        });

        const answeredCount = answered.filter(a => a === true).length;
        const progressPercent = Math.round((answeredCount / TOTAL) * 100);
        const jokeMark = isJoke ? '<span class="joke-badge">😂 Шутка (ответ — Правда!)</span>' : '';

        if (isFinished) {
            const correctTotal = answerStatus.filter(v => v === true).length;
            const percentage = Math.round((correctTotal / TOTAL) * 100);
            let gradeMsg = '';
            if (percentage >= 85) gradeMsg = '🎉 Блестяще! Вы отлично знаете роман! И шутку оценили 😄';
            else if (percentage >= 65) gradeMsg = '👍 Хорошо! Повторите сюжетные линии.';
            else gradeMsg = '📚 Попробуйте ещё раз. Внимательно читайте пояснения.';

            let allItemsHtml = '';
            for (let i = 0; i < TOTAL; i++) {
                const qu = QUESTIONS[i];
                const userChoice = userAnswers[i];
                const isUserCorrect = answerStatus[i];
                const correctText = qu.options[qu.correct];
                const userText = (userChoice !== null) ? qu.options[userChoice] : "Нет ответа";
                const jokeIcon = qu.isJoke ? ' 🎭' : '';
                allItemsHtml += `
                    <div style="background:#faf6ea; border-radius:1rem; padding:0.8rem; margin-bottom:0.8rem;">
                        <strong>${i+1}. ${escapeHtml(qu.text)}${jokeIcon}</strong><br>
                        <span style="color: ${isUserCorrect ? '#2a8745' : '#bc3f2a'};">${isUserCorrect ? '✅ Верно' : '❌ Ошибка'}</span><br>
                        <span>📖 Правильный ответ: ${escapeHtml(correctText)}</span><br>
                        ${!isUserCorrect ? `<span>✏️ Ваш ответ: ${escapeHtml(userText)}</span><br>` : ''}
                        <div style="font-size:13px; opacity:0.7; margin-top:5px;">💡 ${qu.explanation}</div>
                    </div>
                `;
            }

            const finalHtml = `
                <div style="font-size:1.4rem; font-weight:700; margin-bottom:1rem;">📊 РЕЗУЛЬТАТ ВИКТОРИНЫ</div>
                <div style="background:#faf6ea; border-radius:1.2rem; padding:1rem; text-align:center; margin-bottom:1rem;">
                    <span style="font-size:1.5rem; font-weight:700;">${correctTotal} / ${TOTAL} (${percentage}%)</span>
                    <p style="margin-top:0.5rem;">${gradeMsg}</p>
                </div>
                <div class="final-list">${allItemsHtml}</div>
                <div class="nav-buttons" style="justify-content:center; margin-top:1rem;">
                    <button id="restartScreenBtn" class="btn-restart">🔄 Пройти заново</button>
                </div>
            `;
            quizBodyDiv.innerHTML = finalHtml;
            document.getElementById("restartScreenBtn")?.addEventListener("click", () => startScreenMode());
            return;
        }

        const normalHtml = `
            <div class="question-text">
                ${currentIndex + 1}. ${escapeHtml(q.text)} ${jokeMark}
            </div>
            <div class="options-list">
                ${optionsHtml}
            </div>
            <div class="nav-buttons">
                <button id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>◀ Назад</button>
                <button id="nextBtn" class="btn-next">${currentIndex === TOTAL - 1 ? '🏁 Завершить' : 'Следующий →'}</button>
            </div>
            <div class="progress-info">
                📍 Вопрос ${currentIndex+1} из ${TOTAL} | Отвечено: ${answeredCount}/${TOTAL} (${progressPercent}%)
            </div>
        `;
        quizBodyDiv.innerHTML = normalHtml;

        if (!quizCompleted) {
            document.querySelectorAll('.option.selectable').forEach(optDiv => {
                const optIndex = parseInt(optDiv.dataset.optIndex);
                optDiv.addEventListener('click', () => {
                    if (!answered[currentIndex] && !quizCompleted) {
                        answered[currentIndex] = true;
                        onSelectOption_Screen(optIndex);
                    }
                });
            });
        }

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (!quizCompleted && currentIndex > 0) {
                    currentIndex--;
                    renderScreenQuestion();
                }
            });
        }
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (quizCompleted) return;
                if (currentIndex === TOTAL - 1) {
                    finishScreenQuiz();
                } else {
                    if (!answered[currentIndex]) return;
                    currentIndex++;
                    renderScreenQuestion();
                }
            });
        }
    }

    function finishScreenQuiz() {
        if (quizCompleted) return;
        for (let i = 0; i < TOTAL; i++) {
            if (userAnswers[i] !== null) evaluateQuestion(i);
            else answerStatus[i] = false;
        }
        quizCompleted = true;
        renderScreenQuestion();
    }

    function startScreenMode() {
        mode = 'screen';
        quizCompleted = false;
        currentIndex = 0;
        userAnswers = new Array(TOTAL).fill(null);
        answerStatus = new Array(TOTAL).fill(false);
        answered = new Array(TOTAL).fill(false);
        updateScoreUI();
        renderScreenQuestion();
    }

    // ============================ РЕЖИМ "НА ЛИСТОЧКЕ" ============================
    let paperCurrentIndex = 0;

    function renderPaperQuestion() {
        if (paperFinished) {
            let listHtml = `<div class="question-text">📝 Вопросы для самопроверки (на листочке)</div>`;
            listHtml += `<div class="final-list">`;
            QUESTIONS.forEach((q, idx) => {
                const letters = q.type === 'choice' ? ['А', 'Б', 'В', 'Г'] : ['А', 'Б'];
                const optionsStr = q.options.map((opt, i) => `${letters[i]}) ${escapeHtml(opt)}`).join(' · ');
                const jokeIcon = q.isJoke ? ' 🎭' : '';
                listHtml += `
                    <div class="final-item">
                        <strong>${idx+1}. ${escapeHtml(q.text)}${jokeIcon}</strong><br>
                        <span style="color:#7a5a3e; font-size:0.85rem;">${optionsStr}</span>
                    </div>
                `;
            });
            listHtml += `</div><div class="nav-buttons" style="justify-content:center;"><button id="restartPaperBtn" class="btn-restart">🔄 Выбрать режим заново</button></div>`;
            quizBodyDiv.innerHTML = listHtml;
            document.getElementById("restartPaperBtn")?.addEventListener("click", () => showModeSelection());
            return;
        }

        const q = QUESTIONS[paperCurrentIndex];
        const letters = q.type === 'choice' ? ['А', 'Б', 'В', 'Г'] : ['А', 'Б'];
        const isJoke = q.isJoke || false;
        const jokeMark = isJoke ? '<span class="joke-badge">😂 Шутка</span>' : '';
        
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            optionsHtml += `
                <div class="option" style="cursor: default;">
                    <div class="option-letter">${letters[idx]}</div>
                    <div class="option-text">${escapeHtml(opt)}</div>
                </div>
            `;
        });

        const isLast = (paperCurrentIndex === TOTAL - 1);
        const html = `
            <div class="question-text">
                ${paperCurrentIndex + 1}. ${escapeHtml(q.text)} ${jokeMark}
            </div>
            <div class="options-list">
                ${optionsHtml}
            </div>
            <div class="nav-buttons">
                <button id="paperPrevBtn" ${paperCurrentIndex === 0 ? 'disabled' : ''}>◀ Назад</button>
                <button id="paperNextBtn" class="btn-next">${isLast ? '🏁 Завершить' : 'Следующий →'}</button>
            </div>
            <div class="progress-info">
                📍 Вопрос ${paperCurrentIndex+1} из ${TOTAL} · Запишите ответ на листочек
            </div>
        `;
        quizBodyDiv.innerHTML = html;

        const prevBtn = document.getElementById('paperPrevBtn');
        const nextBtn = document.getElementById('paperNextBtn');
        if (prevBtn) {
            prevBtn.addEventListener('click', () => {
                if (paperCurrentIndex > 0) {
                    paperCurrentIndex--;
                    renderPaperQuestion();
                }
            });
        }
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (isLast) {
                    paperFinished = true;
                    renderPaperQuestion();
                } else {
                    paperCurrentIndex++;
                    renderPaperQuestion();
                }
            });
        }
    }

    function startPaperMode() {
        mode = 'paper';
        paperCurrentIndex = 0;
        paperFinished = false;
        renderPaperQuestion();
    }

    // ============================ ЭКРАН ВЫБОРА РЕЖИМА ============================
    function showModeSelection() {
        mode = null;
        const modeHtml = `
            <div class="mode-screen">
                <div>
                    <div class="mode-title">📖 Как вы будете отвечать?</div>
                    <div class="mode-desc">Тема: «Евгений Онегин» А.С. Пушкина · 20 вопросов · 9 класс</div>
                </div>
                <div class="mode-buttons">
                    <button class="mode-btn" id="screenModeBtn">🖥️ На экране<br><small>выбор ответа, подсветка, баллы</small></button>
                    <button class="mode-btn paper" id="paperModeBtn">📄 На листочке<br><small>просто вопросы, ответы записываете отдельно</small></button>
                </div>
                <div class="mode-desc" style="margin-top: 1rem;">✔️ В режиме «На листочке» вы не выбираете ответ на экране — только читаете вопрос и варианты, а ответ пишете на бумаге.</div>
            </div>
        `;
        quizBodyDiv.innerHTML = modeHtml;
        document.getElementById("screenModeBtn")?.addEventListener("click", startScreenMode);
        document.getElementById("paperModeBtn")?.addEventListener("click", startPaperMode);
        scoreSpan.innerText = "0";
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    showModeSelection();
</script>
</body>
</html>
